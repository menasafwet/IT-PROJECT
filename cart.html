<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>عربة التسوق - مشروع المتجر</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="cart-container">
        <h2>🛒 عربة التسوق الخاصة بك</h2>
        
        <table class="cart-table">
            <thead>
                <tr>
                    <th>المنتج</th>
                    <th>السعر</th>
                    <th>الكمية</th>
                    <th>الإجمالي الفرعي</th>
                    <th>إجراء</th>
                </tr>
            </thead>
            <tbody id="cart-items">
                <tr>
                    <td>
                        <strong>سماعات لاسلكية</strong>
                    </td>
                    <td>150 ج.م</td>
                    <td>
                        <input type="number" value="1" min="1" class="qty-input">
                    </td>
                    <td class="subtotal">150 ج.م</td>
                    <td>
                        <button class="btn-remove">حذف 🗑️</button>
                    </td>
                </tr>

                <tr>
                    <td>
                        <strong>ساعة ذكية</strong>
                    </td>
                    <td>300 ج.م</td>
                    <td>
                        <input type="number" value="1" min="1" class="qty-input">
                    </td>
                    <td class="subtotal">300 ج.م</td>
                    <td>
                        <button class="btn-remove">حذف 🗑️</button>
                    </td>
                </tr>
            </tbody>
        </table>

        <div class="cart-summary">
            <h3>ملخص الحساب</h3>
            <div style="display: flex; justify-content: space-between; align-items: center;">
                <p>الإجمالي النهائي للمشتريات:</p>
                <span id="total-price">450 ج.م</span>
            </div>
            <button class="btn-checkout" style="width: 100%; padding: 15px; background: #27ae60; color: white; border: none; border-radius: 5px; cursor: pointer; margin-top: 10px; font-size: 18px;">
                إتمام عملية الشراء
            </button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
