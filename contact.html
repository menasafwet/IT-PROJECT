<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>تواصل معنا - مكتبه الكتب</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <button id="theme-btn" class="theme-toggle">تغير وضع الالوان</button>
    <div class="container">
        <header>
            <h1>اتصل بنا</h1>
        </header>
        <div class="main">
            <section class="form-section">
                <h2>ارسل استفسارك</h2>
                <form id="contactForm">
                    <div class="field">
                        <label>لاسم رباعي </label>
                        <input type="text" id="name" placeholder="اكتب اسمك هنا">
                        <label>البريد الالكتروني</label>
                        <input type="text" id="email" placeholder="ahmeddlsm12@gmail.com">
                        <label>الرساله</label>
                        <textarea id="message" rows="4" placeholder="كيف يمكننا مساعدتك"></textarea>
                    </div>
                    <button type="submit" id="submit-btn">ارسال البيانات</button>
                </form>
            </section>

            <aside class="info-section">
                <h2>موقعنا</h2>
                <div class="map">
                    <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3453!2d31.2!3d30.0!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMzDCsDAwJzAwLjAiTiAzMcKwMTInMDAuMCJF!5e0!3m2!1sar!2seg!4v1620000000000!5m2!1sar!2seg" width="100%" height="200" style="border: 0;"></iframe>

                </div>
                <div class="social">
                    <h3></h3>
                    <div class="social-icons">
                         <a href="#"><i class="fab fa-facebood"></i></a>
                         <a href="#"><i class="fab fa-instagram"></i></a>
                         <a href="#"><i class="fab fa-whatsapp"></i></a>

                    </div>
                </div>

            </aside>

        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
